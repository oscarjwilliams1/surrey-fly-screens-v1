<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Background -->
  <rect width="400" height="400" fill="#ffffff" rx="32"/>

  <!-- Icon container -->
  <rect x="140" y="80" width="120" height="120" rx="12" fill="#2E6B4F"/>

  <!-- Mesh grid lines (horizontal) -->
  <line x1="140" y1="120" x2="260" y2="120" stroke="white" stroke-width="4" opacity="0.7"/>
  <line x1="140" y1="152" x2="260" y2="152" stroke="white" stroke-width="4" opacity="0.7"/>
  <line x1="140" y1="184" x2="260" y2="184" stroke="white" stroke-width="4" opacity="0.7"/>

  <!-- Mesh grid lines (vertical) -->
  <line x1="180" y1="80" x2="180" y2="200" stroke="white" stroke-width="4" opacity="0.7"/>
  <line x1="212" y1="80" x2="212" y2="200" stroke="white" stroke-width="4" opacity="0.7"/>
  <line x1="244" y1="80" x2="244" y2="200" stroke="white" stroke-width="4" opacity="0.7"/>

  <!-- Icon border -->
  <rect x="140" y="80" width="120" height="120" rx="12" fill="none" stroke="white" stroke-width="5"/>

  <!-- Surrey text -->
  <text x="200" y="268" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="700" fill="#1A3C2E" text-anchor="middle" letter-spacing="-1">Surrey</text>

  <!-- Fly Screens text -->
  <text x="200" y="308" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600" fill="#2E6B4F" text-anchor="middle" letter-spacing="5" text-transform="uppercase">FLY SCREENS</text>

  <!-- Tagline -->
  <text x="200" y="348" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="400" fill="#6B7280" text-anchor="middle" letter-spacing="1">Est. 2024 · Surrey, UK</text>
</svg>
