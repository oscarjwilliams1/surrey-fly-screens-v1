<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- White background -->
  <rect width="400" height="400" fill="#ffffff" rx="28"/>

  <!-- Icon: solid green rounded square, 180×180, centred -->
  <!-- x=110, y=60, w=180, h=180 → rows 180/6=30px each, cols 180/3=60px each -->
  <rect x="110" y="60" width="180" height="180" rx="18" fill="#2E6B4F"/>

  <!-- Grid lines clipped to icon rect -->
  <clipPath id="ic2">
    <rect x="110" y="60" width="180" height="180" rx="18"/>
  </clipPath>
  <g clip-path="url(#ic2)" stroke="white" stroke-width="1.8" opacity="0.9">
    <!-- 5 horizontal lines → 6 equal rows of 30px -->
    <line x1="110" y1="90"  x2="290" y2="90"/>
    <line x1="110" y1="120" x2="290" y2="120"/>
    <line x1="110" y1="150" x2="290" y2="150"/>
    <line x1="110" y1="180" x2="290" y2="180"/>
    <line x1="110" y1="210" x2="290" y2="210"/>
    <!-- 2 vertical lines → 3 equal columns of 60px -->
    <line x1="170" y1="60"  x2="170" y2="240"/>
    <line x1="230" y1="60"  x2="230" y2="240"/>
  </g>

  <!-- Icon border -->
  <rect x="110" y="60" width="180" height="180" rx="18" fill="none" stroke="white" stroke-width="4"/>

  <!-- Surrey -->
  <text x="200" y="316" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-weight="700" fill="#1A3C2E" text-anchor="middle" letter-spacing="-2">Surrey</text>

  <!-- FLY SCREENS -->
  <text x="200" y="356" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#4A9B72" text-anchor="middle" letter-spacing="7">FLY SCREENS</text>
</svg>
