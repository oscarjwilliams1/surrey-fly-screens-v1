<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- White background -->
  <rect width="400" height="400" fill="#ffffff" rx="28"/>

  <!-- Dark outer circle -->
  <circle cx="200" cy="152" r="108" fill="#1A3C2E"/>

  <!-- Clip to icon rounded rect -->
  <clipPath id="ic2">
    <rect x="148" y="100" width="104" height="104" rx="12"/>
  </clipPath>

  <!-- Icon: solid filled rounded square -->
  <rect x="148" y="100" width="104" height="104" rx="12" fill="#2E6B4F"/>

  <!-- Fine grid lines: 7 horizontal + 2 vertical -->
  <g clip-path="url(#ic2)" stroke="white" stroke-width="1.2" opacity="0.85">
    <line x1="148" y1="115" x2="252" y2="115"/>
    <line x1="148" y1="129" x2="252" y2="129"/>
    <line x1="148" y1="143" x2="252" y2="143"/>
    <line x1="148" y1="152" x2="252" y2="152"/>
    <line x1="148" y1="166" x2="252" y2="166"/>
    <line x1="148" y1="180" x2="252" y2="180"/>
    <line x1="148" y1="190" x2="252" y2="190"/>
    <line x1="183" y1="100" x2="183" y2="204"/>
    <line x1="217" y1="100" x2="217" y2="204"/>
  </g>

  <!-- Icon border -->
  <rect x="148" y="100" width="104" height="104" rx="12" fill="none" stroke="white" stroke-width="3.5"/>

  <!-- Surrey -->
  <text x="200" y="316" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-weight="700" fill="#1A3C2E" text-anchor="middle" letter-spacing="-2">Surrey</text>

  <!-- FLY SCREENS -->
  <text x="200" y="356" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#4A9B72" text-anchor="middle" letter-spacing="7">FLY SCREENS</text>
</svg>
